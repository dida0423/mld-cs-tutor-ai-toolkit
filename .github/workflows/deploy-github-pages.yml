# Deploy static site to GitHub Pages (source: GitHub Actions).
#
# Setup (once per repo):
# 1. Settings → Secrets and variables → Actions → New repository secret
#    Name:  OPENAI_API_KEY
#    Value: your OpenAI API key (same as local .env)
# 2. Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# Note: OPENAI_API_KEY is available during `vite build` for parity with local .env.
# The built site still calls /api/openai in the browser; GitHub Pages does not run
# Vite's dev proxy. For a working API on Pages you need a separate serverless proxy
# (e.g. Cloudflare Worker) and a VITE_* base URL change—not covered by this workflow alone.

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Build
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
